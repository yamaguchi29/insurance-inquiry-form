<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火災保険総合窓口 問い合わせフォーム</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  </head>
  <body>
    <div class="container">
      <h2>火災保険総合窓口 問い合わせフォーム</h2>
      <div class="item">
        <label>証券番号</label>
        <input type="text" id="policy-number" placeholder="例：T001" />
      </div>
      <div class="item">
        <label>名前（必須）</label>
        <input type="text" id="name" placeholder="例：山田 太郎" />
      </div>
      <div class="item">
        <label>電話番号（必須）</label>
        <input type="tel" id="phone" placeholder="例：03-1234-5678" />
      </div>
      <button id="submit-btn">スプレッドシートに保存</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
